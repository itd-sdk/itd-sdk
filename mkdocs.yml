site_name: itd-sdk
repo_url: https://github.com/firedotguy/itd-sdk

theme:
  name: material

  features:
    - navigation.footer
    - content.code.annotate

  palette:
    scheme: slate
    primary: deep orange
    accent: orange

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji

extra_css:
  - stylesheets/extra.css